<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Recommendation Chatbot</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --secondary-color: #e2e8f0;
            --background-color: #f8fafc;
            --text-color: #1e293b;
            --bot-message-bg: #e2e8f0;
            --user-message-bg: #bfdbfe;
            --border-radius: 12px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            background-color: var(--primary-color);
            color: white;
            padding: 1rem;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .chat-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            padding: 1rem;
            box-sizing: border-box;
            height: calc(100vh - 160px);
        }

        .messages-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            max-width: 80%;
            padding: 0.75rem 1rem;
            border-radius: var(--border-radius);
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            position: relative;
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bot-message {
            align-self: flex-start;
            background-color: var(--bot-message-bg);
            border-bottom-left-radius: 4px;
        }

        .user-message {
            align-self: flex-end;
            background-color: var(--user-message-bg);
            border-bottom-right-radius: 4px;
        }

        .news-card {
            background-color: white;
            border-radius: var(--border-radius);
            padding: 1rem;
            margin-top: 0.5rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .news-card:hover {
            transform: translateY(-2px);
        }

        .news-card h3 {
            margin-top: 0;
            margin-bottom: 0.5rem;
            color: var(--primary-color);
        }

        .news-card p {
            margin: 0;
            color: #64748b;
            font-size: 0.9rem;
        }

        .input-container {
            display: flex;
            padding: 1rem;
            gap: 0.5rem;
            background-color: white;
            border-top: 1px solid var(--secondary-color);
        }

        #user-input {
            flex-grow: 1;
            padding: 0.75rem 1rem;
            border: 1px solid var(--secondary-color);
            border-radius: var(--border-radius);
            font-size: 1rem;
        }

        #user-input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        #send-button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        #send-button:hover {
            background-color: #1d4ed8;
        }

        .typing-indicator {
            display: flex;
            gap: 0.3rem;
            padding: 0.5rem 1rem;
            background-color: var(--bot-message-bg);
            border-radius: var(--border-radius);
            align-self: flex-start;
            width: fit-content;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background-color: #64748b;
            border-radius: 50%;
            display: inline-block;
            animation: typing 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(0); }
        }

        .news-container {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 0.5rem;
        }

        .news-item {
            background-color: white;
            border-radius: var(--border-radius);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            overflow: hidden;
            width: calc(50% - 0.5rem);
            transition: transform 0.2s;
        }

        .news-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
        }

        .news-image {
            height: 150px;
            background-color: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .news-content {
            padding: 1rem;
        }

        .news-title {
            font-size: 1rem;
            font-weight: 600;
            margin: 0 0 0.5rem 0;
            color: var(--text-color);
        }

        .news-description {
            font-size: 0.875rem;
            color: #64748b;
            margin: 0 0 0.5rem 0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .news-source {
            font-size: 0.75rem;
            color: var(--primary-color);
            font-weight: 500;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 768px) {
            .news-item {
                width: 100%;
            }
        }

        .api-key-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .api-key-modal {
            background-color: white;
            padding: 2rem;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 500px;
        }

        .api-key-modal h2 {
            margin-top: 0;
            color: var(--primary-color);
        }

        .api-key-modal p {
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        .api-key-modal input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--secondary-color);
            border-radius: var(--border-radius);
            margin-bottom: 1rem;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .api-key-modal button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .api-key-modal button:hover {
            background-color: #1d4ed8;
        }
    </style>
</head>
<body>
    <div class="api-key-container" id="api-key-prompt">
        <div class="api-key-modal">
            <h2>Welcome to the News Recommendation Chatbot</h2>
            <p>To use this chatbot, you'll need an API key. Please enter your API key below.</p>
            <p>This key will be stored locally in your browser and is only used to communicate with the DeepSeek API.</p>
            <input type="password" id="api-key-input" placeholder="Enter your API key">
            <button id="save-api-key">Save and Continue</button>
        </div>
    </div>

    <div class="header">
        <h1>News Recommendation Chatbot</h1>
    </div>

    <div class="chat-container">
        <div class="messages-container" id="messages">
            <!-- Messages will be added here dynamically -->
        </div>

        <div class="input-container">
            <input type="text" id="user-input" placeholder="Type your message here..." autocomplete="off">
            <button id="send-button">Send</button>
        </div>
    </div>

    <script>
        // Global variables
        const messagesContainer = document.getElementById('messages');
        const userInput = document.getElementById('user-input');
        const sendButton = document.getElementById('send-button');
        const apiKeyModal = document.getElementById('api-key-prompt');
        const apiKeyInput = document.getElementById('api-key-input');
        const saveApiKeyButton = document.getElementById('save-api-key');
        
        let apiKey = localStorage.getItem('deepseek_api_key');
        let conversationHistory = [];
        let userProfile = {
            interests: [],
            preferredSources: [],
            readingLevel: 'medium',
            newsUpdateFrequency: 'daily'
        };
        
        // Sample news data (in a real app, this would come from a news API)
        const newsData = {
            technology: [
                {
                    title: "New AI Breakthrough Revolutionizes Natural Language Processing",
                    description: "Researchers have developed a new algorithm that significantly improves machine understanding of human language.",
                    source: "Tech Insider",
                    image: "/api/placeholder/400/300"
                },
                {
                    title: "Quantum Computing Reaches Major Milestone",
                    description: "Scientists achieve quantum supremacy with a processor that performs calculations beyond the capabilities of traditional supercomputers.",
                    source: "Future Tech Today",
                    image: "/api/placeholder/400/300"
                }
            ],
            business: [
                {
                    title: "Global Markets Rally After Economic Report",
                    description: "Stock markets worldwide show strong gains following better-than-expected economic indicators.",
                    source: "Business Journal",
                    image: "/api/placeholder/400/300"
                },
                {
                    title: "Startup Secures $50 Million in Funding",
                    description: "Tech startup focusing on sustainable energy solutions receives major investment to scale operations.",
                    source: "Venture Capital Review",
                    image: "/api/placeholder/400/300"
                }
            ],
            health: [
                {
                    title: "New Study Reveals Benefits of Mediterranean Diet",
                    description: "Research confirms significant health improvements for participants following the Mediterranean eating pattern.",
                    source: "Health Today",
                    image: "/api/placeholder/400/300"
                },
                {
                    title: "Breakthrough in Cancer Treatment Shows Promise",
                    description: "Clinical trials demonstrate effectiveness of new immunotherapy approach with fewer side effects.",
                    source: "Medical Research Weekly",
                    image: "/api/placeholder/400/300"
                }
            ],
            sports: [
                {
                    title: "Underdog Team Wins Championship in Stunning Upset",
                    description: "Against all odds, the underrated team defeated the defending champions in an extraordinary final match.",
                    source: "Sports Network",
                    image: "/api/placeholder/400/300"
                },
                {
                    title: "Olympic Athlete Breaks World Record",
                    description: "Star performer shatters decade-old record in breathtaking display of athletic excellence.",
                    source: "Olympic Observer",
                    image: "/api/placeholder/400/300"
                }
            ],
            entertainment: [
                {
                    title: "Acclaimed Director Announces Surprise New Film",
                    description: "Award-winning filmmaker reveals ambitious project with all-star cast set to begin production next month.",
                    source: "Entertainment Weekly",
                    image: "/api/placeholder/400/300"
                },
                {
                    title: "Music Festival Lineup Revealed for Summer Event",
                    description: "Organizers announce impressive roster of artists for this year's most anticipated music celebration.",
                    source: "Music Trends",
                    image: "/api/placeholder/400/300"
                }
            ],
            science: [
                {
                    title: "Mars Rover Discovers Evidence of Ancient Water",
                    description: "Latest findings provide strongest indication yet of past conditions suitable for life on the red planet.",
                    source: "Space Science Today",
                    image: "/api/placeholder/400/300"
                },
                {
                    title: "Biodiversity Study Identifies Hundreds of New Species",
                    description: "Researchers document previously unknown plants and animals in expedition to remote rainforest region.",
                    source: "Nature Observer",
                    image: "/api/placeholder/400/300"
                }
            ]
        };

        // Initialize the chat
        function initializeChat() {
            if (apiKey) {
                apiKeyModal.classList.add('hidden');
                addBotMessage("Hi there! I'm your personal news recommendation assistant. I'd like to understand your interests better to recommend news that matters to you. What topics are you generally interested in? (e.g., technology, business, health, sports, entertainment, science)");
            } else {
                apiKeyModal.classList.remove('hidden');
            }
        }

        // Event listener for saving API key
        saveApiKeyButton.addEventListener('click', () => {
            const key = apiKeyInput.value.trim();
            if (key) {
                localStorage.setItem('deepseek_api_key', key);
                apiKey = key;
                apiKeyModal.classList.add('hidden');
                addBotMessage("Hi there! I'm your personal news recommendation assistant. I'd like to understand your interests better to recommend news that matters to you. What topics are you generally interested in? (e.g., technology, business, health, sports, entertainment, science)");
            } else {
                alert("Please enter a valid API key.");
            }
        });

        // Add a bot message to the chat
        function addBotMessage(message) {
            const messageElement = document.createElement('div');
            messageElement.classList.add('message', 'bot-message');
            
            // Check if the message contains news recommendations
            if (message.includes('[NEWS_RECOMMENDATIONS]')) {
                const [text, categories] = message.split('[NEWS_RECOMMENDATIONS]');
                messageElement.textContent = text;
                
                const categoriesArray = categories.split(',').map(c => c.trim());
                const newsContainer = document.createElement('div');
                newsContainer.classList.add('news-container');
                
                categoriesArray.forEach(category => {
                    if (newsData[category]) {
                        newsData[category].forEach(news => {
                            const newsItem = document.createElement('div');
                            newsItem.classList.add('news-item');
                            
                            newsItem.innerHTML = `
                                <div class="news-image">
                                    <img src="${news.image}" alt="${news.title}" width="100%" height="100%">
                                </div>
                                <div class="news-content">
                                    <h3 class="news-title">${news.title}</h3>
                                    <p class="news-description">${news.description}</p>
                                    <p class="news-source">${news.source}</p>
                                </div>
                            `;
                            
                            newsContainer.appendChild(newsItem);
                        });
                    }
                });
                
                messageElement.appendChild(newsContainer);
            } else {
                messageElement.textContent = message;
            }
            
            messagesContainer.appendChild(messageElement);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            
            // Add message to conversation history
            conversationHistory.push({
                role: "assistant",
                content: message
            });
        }

        // Add a user message to the chat
        function addUserMessage(message) {
            const messageElement = document.createElement('div');
            messageElement.classList.add('message', 'user-message');
            messageElement.textContent = message;
            messagesContainer.appendChild(messageElement);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            
            // Add message to conversation history
            conversationHistory.push({
                role: "user",
                content: message
            });
        }

        // Show typing indicator
        function showTypingIndicator() {
            const indicator = document.createElement('div');
            indicator.classList.add('typing-indicator');
            indicator.id = 'typing-indicator';
            indicator.innerHTML = '<span></span><span></span><span></span>';
            messagesContainer.appendChild(indicator);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Hide typing indicator
        function hideTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) {
                indicator.remove();
            }
        }

        // Process user message and get bot response
        async function processMessage(userMessage) {
            addUserMessage(userMessage);
            userInput.value = '';
            showTypingIndicator();
            
            try {
                // Create a system message that instructs the AI to act as a news recommendation chatbot
                const systemMessage = {
                    role: "system",
                    content: `You are a helpful news recommendation chatbot. Your goal is to understand the user's interests by asking them questions, and then recommend relevant news articles. 
                    
                    After gathering enough information about their interests, recommend news by including the text [NEWS_RECOMMENDATIONS] followed by a comma-separated list of categories. 
                    
                    For example: "Based on your interests in AI and healthcare, here are some articles you might enjoy! [NEWS_RECOMMENDATIONS]technology,health"
                    
                    Available news categories are: technology, business, health, sports, entertainment, science.
                    
                    Ask targeted questions to understand what specific subtopics within these categories the user might be interested in. Be conversational and friendly.`
                };
                
                // Prepare the complete conversation history for the API call
                const messages = [systemMessage, ...conversationHistory];
                
                // Make the API call to DeepSeek
                const response = await fetch('https://api.deepseek.com/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: 'deepseek-chat',
                        messages: messages,
                        stream: false
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`API error: ${response.status}`);
                }
                
                const data = await response.json();
                const botResponse = data.choices[0].message.content;
                
                hideTypingIndicator();
                addBotMessage(botResponse);
                
                // Update user profile based on the conversation
                updateUserProfile(userMessage, botResponse);
                
            } catch (error) {
                console.error('Error:', error);
                hideTypingIndicator();
                addBotMessage("I'm sorry, there was an error processing your request. Please check your API key or try again later.");
            }
        }

        // Update user profile based on the conversation
        function updateUserProfile(userMessage, botResponse) {
            // Simple profile update logic - in a real app, this would be more sophisticated
            const interestKeywords = [
                'technology', 'tech', 'ai', 'software', 'gadgets', 
                'business', 'finance', 'economy', 'stocks', 'market',
                'health', 'medical', 'fitness', 'wellness', 'nutrition',
                'sports', 'football', 'basketball', 'tennis', 'olympics',
                'entertainment', 'movies', 'music', 'celebrity', 'art',
                'science', 'research', 'space', 'climate', 'biology'
            ];
            
            const userMessageLower = userMessage.toLowerCase();
            
            interestKeywords.forEach(keyword => {
                if (userMessageLower.includes(keyword) && !userProfile.interests.includes(keyword)) {
                    userProfile.interests.push(keyword);
                }
            });
        }

        // Event listeners
        sendButton.addEventListener('click', () => {
            const message = userInput.value.trim();
            if (message) {
                processMessage(message);
            }
        });

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const message = userInput.value.trim();
                if (message) {
                    processMessage(message);
                }
            }
        });

        // Initialize the chat when the page loads
        window.addEventListener('load', initializeChat);
    </script>
</body>
</html>
